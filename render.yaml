services:
  # FastAPI Backend Service
  - type: web
    name: thcs-giathanh-api
    runtime: docker
    plan: standard
    
    # Build configuration
    dockerfilePath: ./Dockerfile
    
    # Environment variables (configure on Render dashboard)
    envVars:
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      # External PostgreSQL (Supabase) - set in Render dashboard
      - key: DATABASE_URL
        sync: false
      # External Redis (Upstash) - set in Render dashboard
      - key: REDIS_URL
        sync: false
      # OpenAI API Key - add via Render Environment
      - key: OPENAI_API_KEY
        sync: false
      # Supabase - add via Render Environment
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_API_KEY
        sync: false
    
    # Auto-deploy on push
    autoDeploy: true
    
    # Region (close to users)
    region: singapore
    
    # Scaling
    numInstances: 1
    
    # Health check
    healthCheckPath: /health
